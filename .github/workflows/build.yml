name: "Build and Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install libpcap

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ""
        with:
          tagName: v__VERSION__
          releaseName: "Vigilance v__VERSION__"
          releaseBody: |
            ## Vigilance Network Monitor
            
            ### Downloads
            - **Windows**: Download the `.msi` installer
            - **macOS**: Download the `.dmg` file (Universal — works on Intel and Apple Silicon)
            
            ### Notes
            - Windows requires Administrator privileges for firewall blocking
            - macOS requires allowing the app in System Preferences > Security on first run
            - Add your AbuseIPDB key to the config file for threat intelligence
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}