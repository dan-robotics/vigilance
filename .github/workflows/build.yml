name: "Build and Release"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install libpcap

      - name: Create GeoIP placeholder
        run: python3 -c "open('src-tauri/resources/GeoLite2-Country.mmdb', 'wb').write(b'\x00' * 64)"

      - name: Create empty config.json
        run: >
          python3 -c "
          import json;
          config = {
            'abuseipdb_key': None,
            'abuseipdb_enabled': False,
            'cache_hours': 24,
            'threat_score_red': 50,
            'threat_score_yellow': 20
          };
          open('src-tauri/resources/config.json', 'w').write(json.dumps(config))
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Vigilance v__VERSION__"
          releaseBody: |
            ## Vigilance Network Monitor

            ### Downloads
            - **Windows**: Download the `.msi` installer
            - **macOS**: Download the `.dmg` (Universal — Intel + Apple Silicon)

            ### Setup
            1. Get free GeoLite2-Country.mmdb from MaxMind
            2. Copy config.example.json to config.json
            3. Add your free AbuseIPDB key for threat intelligence (optional)

            ### Notes
            - Windows requires Administrator privileges
            - macOS: right-click → Open on first launch
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}